name: CI

# CI/CD moved to Depllo (.depllo-ci.yml) 2026-07-15 — push/PR triggers
# disabled; manual-dispatch fallback only.
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, frontend, cli, e2e]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.dir }}
      - run: npm run lint
        working-directory: ${{ matrix.dir }}

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forjio_brand_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forjio_brand_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma migrate deploy
        working-directory: backend
      - run: npm test
        working-directory: backend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    strategy:
      matrix:
        dir: [backend, frontend, cli]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.dir }}
      - run: |
          if [ "${{ matrix.dir }}" = "backend" ]; then npx prisma generate; fi
        working-directory: ${{ matrix.dir }}
      - run: npm run build
        working-directory: ${{ matrix.dir }}
