# nginx vhost for fulkruma.com — single Next.js process serves both
# the marketing site and the dashboard. Express backend on :4140 is
# reachable directly at /api/v1/* for SDK + health + webhooks.
#
# /api/v1 path split:
#   Next.js owns:  auth/*, session, huudis/*, fulkruma/*
#                  (the same-origin portal proxy + Huudis OIDC bridge)
#   Backend owns:  everything else under /api/v1/* — health, admin,
#                  webhooks, warehouses, products, stock, etc.
#
# Default route → Next.js (marketing + dashboard + SSR).

upstream fulkruma_frontend { server 127.0.0.1:3140; keepalive 16; }
upstream fulkruma_backend  { server 127.0.0.1:4140; keepalive 16; }

# ─── 80 → 443 ────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name fulkruma.com www.fulkruma.com fulkruma.forjio.com;
  return 301 https://$host$request_uri;
}

# ─── 443 ─────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name fulkruma.com www.fulkruma.com fulkruma.forjio.com;

  ssl_certificate     /etc/letsencrypt/live/fulkruma.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/fulkruma.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

  client_max_body_size 8m;

  # ── Next.js-owned API paths (must come BEFORE the backend default) ──

  # Same-origin portal proxy — Next signs each call with the internal-secret
  # before forwarding to the backend. Keeps merchant-facing API behind
  # the session cookie.
  location ^~ /api/v1/fulkruma/ {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
  # Huudis SSO — auth bootstrap + OIDC code-flow proxy.
  location ^~ /api/v1/huudis/ {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
  # Login / signup / password reset / session / logout / OIDC callback.
  location ^~ /api/v1/auth/ {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
  location = /api/v1/session {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ── Backend-owned API paths ──

  # Inbound webhooks need the raw body untouched (signature verification).
  location ^~ /api/v1/webhooks/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Everything else under /api/v1/* — health, admin, products, warehouses,
  # stock, shipments, licenses, deliveries, integrations, etc. (SDK +
  # internal-secret callers).
  location ^~ /api/v1/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 60s;
  }

  # Default — Next.js (handles marketing + dashboard + auth + portal proxy)
  location / {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
