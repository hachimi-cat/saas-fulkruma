# nginx vhost for fulkruma.com — single Next.js process serves both
# the marketing site and the dashboard. Express backend on :4140 is
# reachable directly at /api/v1/* for SDK + health + webhooks.
#
# /api/v1 path split (BFF — the backend is the Huudis OAuth client):
#   Next.js owns:  fulkruma/*  (the same-origin data proxy — forwards
#                  the fulkruma_session cookie to the backend)
#   Backend owns:  everything else under /api/v1/* — auth/*, huudis/*,
#                  health, admin, webhooks, warehouses, products, etc.
#
# Default route → Next.js (marketing + dashboard + SSR).

upstream fulkruma_frontend { server 127.0.0.1:3140; keepalive 16; }
upstream fulkruma_backend  { server 127.0.0.1:4140; keepalive 16; }

# ─── 80 → 443 ────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name staging-fulkruma.forjio.com;
  return 301 https://$host$request_uri;
}

# ─── 443 ─────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name staging-fulkruma.forjio.com;

  ssl_certificate     /etc/letsencrypt/live/staging-fulkruma.forjio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging-fulkruma.forjio.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

  client_max_body_size 8m;

  # ── Next.js-owned API paths (must come BEFORE the backend default) ──

  # Same-origin data proxy — the thin frontend forwards each call (with
  # the fulkruma_session cookie) to the backend, which authenticates it.
  location ^~ /api/v1/fulkruma/ {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
  # Huudis IAM proxy — owned by the backend BFF (resolves the session
  # cookie, calls Huudis with the stored token, refreshes reactively).
  location ^~ /api/v1/huudis/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
  # Huudis SSO — login / signup / logout / password reset / OIDC
  # start+callback / me — owned by the backend BFF (it is the OIDC
  # client). /api/v1/session is gone: the thin frontend useAuth() hits
  # /api/v1/auth/me instead.
  location ^~ /api/v1/auth/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }

  # ── Backend-owned API paths ──

  # Inbound webhooks need the raw body untouched (signature verification).
  location ^~ /api/v1/webhooks/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Everything else under /api/v1/* — health, admin, products, warehouses,
  # stock, shipments, licenses, deliveries, integrations, etc. (SDK +
  # internal-secret callers).
  location ^~ /api/v1/ {
    proxy_pass http://fulkruma_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 60s;
  }

  # Default — Next.js (handles marketing + dashboard + auth + portal proxy)
  location / {
    proxy_pass http://fulkruma_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
